version: '3.8'

services:
  ep11server1:
    image: 
    privileged: true 
    restart: always
    volumes:
      - ./cfg:/etc/c16
      - ./srv:/cfg
      - ./srv/grep11server1.yaml:/etc/ep11server/ep11server.yaml
    networks:
      - custom_network

  ep11server2:
    image: 
    restart: always
    privileged: true 
    volumes:
      - ./cfg:/etc/c16
      - ./srv:/cfg
      - ./srv/grep11server2.yaml:/etc/ep11server/ep11server.yaml
    networks:
      - custom_network

  nginx:
    image: 
    restart: always
    ports:
      - "9876:9876"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    networks:
      - custom_network

networks:
  custom_network:
    driver: bridge

